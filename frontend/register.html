<!DOCTYPE html>

<html>

<head>

<title>Amma Expense Tracker - Register</title>

<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="overlay">

<div class="login-card">

<h1>🌸🏡 Home Minister's Budget Book 🌸</h1>

<p class="welcome">Create your account to start tracking 💖</p>

<h2>Register</h2>

<input type="text" id="name" placeholder="👩 Enter Name">

<input type="email" id="email" placeholder="📧 Enter Email">

<input type="password" id="password" placeholder="🔒 Enter Password">

<button onclick="register()">🌷 Register</button>

<p class="register-text">Already have an account?</p>

<a class="register-link" href="index.html">✨ Login Here</a>

</div>

</div>

<script>

async function register(){

const name=document.getElementById("name").value
const email=document.getElementById("email").value
const password=document.getElementById("password").value

if(name==="" || email==="" || password===""){
alert("Please fill all fields 😊")
return
}

const res=await fetch("https://amma-expense.onrender.com/api/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({name,email,password})

})

const data=await res.json()

if(data.token){

localStorage.setItem("token",data.token)

window.location.href="dashboard.html"

}else{

alert(data.message)

}

}

</script>

</body>

</html>
